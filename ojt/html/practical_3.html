<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form action="na"></form>
    <hr>
    <h1>Registration Form</h1>
    <form action="/register">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <br>
        <label for="enrollment">Enrollment No:</label>
        <input type="number" id="enrollment_no" name="enrollment" max="12">
        <!-- Enrollment no is not linked to its label because label links with id and not by name attribute of form. -->
        <br>
        <label for="branch">Branch:</label>
        <select name="branch" id="branch">
            <option value="B.tech">B.tech</option>
            <option value="BCA">BCA</option>
            <option value="BS">BS</option>
        </select>
        <br>
        <label for="division">Division:</label>
        <input type="text" id="division" name="division" max="1">
        <br>
        <!-- The radio button should have same name to work as radiobutton else it will not work. -->
        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
        <br>
        <label for="photo">Photo:</label>
        <input type="file" id="photo" name="photo">
        <br>
        <br>
        <br>
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
